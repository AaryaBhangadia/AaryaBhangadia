<svg width="1150" height="760" viewBox="0 0 1150 760" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, monospace">
  <style>
    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .n1{animation-delay:.2s}.n2{animation-delay:.35s}.n3{animation-delay:.5s}
    .spark { stroke-dasharray: 1300; stroke-dashoffset: 1300; animation: draw 2.4s cubic-bezier(.6,0,.2,1) .6s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .fillfade { opacity: 0; animation: fade 1.2s ease 1.4s forwards; }
    @keyframes fade { to { opacity: 1; } }
    .ping { animation: ping 2.2s ease-out infinite; transform-origin: 1080px 77px; }
    @keyframes ping { 0%{transform:scale(.4);opacity:.9} 80%,100%{transform:scale(2.6);opacity:0} }
    .reveal { stroke-dasharray: 670; stroke-dashoffset: 670; animation: revealline 1.3s cubic-bezier(.4,0,.2,1) .3s forwards; }
    @keyframes revealline { to { stroke-dashoffset: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .rise,.spark,.fillfade,.ping,.reveal { animation: none; }
      .rise,.fillfade{opacity:1} .spark{stroke-dashoffset:0} .ping{opacity:0} .reveal{stroke-dashoffset:0}
    }
  </style>

  <rect width="1150" height="760" fill="#0C1015"/>

  <!-- header -->
  <text x="0" y="56" font-size="62" fill="#ffffff" font-weight="bold">03</text>
  <text x="90" y="48" font-size="20" letter-spacing="4" fill="#e6e6ec">TELEMETRY</text>
  <line class="reveal" x1="320" y1="40" x2="990" y2="40" stroke="#c9c9d1" stroke-width="1"/>
  <text x="1102" y="48" font-size="13" fill="#6f6f78" text-anchor="end">~/03-telemetry</text>

  <!-- left: repository overview -->
  <rect x="0" y="90" width="360" height="270" fill="none" stroke="#343A40" stroke-width="1.3" stroke-opacity=".6"/>
  <text x="20" y="124" font-size="15" letter-spacing="4" fill="#e6e6ec">REPOSITORY OVERVIEW</text>
  <line x1="20" y1="140" x2="340" y2="140" stroke="#343A40" stroke-width="1.3" stroke-opacity=".6"/>

  <text x="20" y="184" font-size="17" fill="#b7b7bf">Public repositories</text>
  <text x="340" y="184" font-size="17" fill="#ffffff" text-anchor="end">5</text>
  <text x="20" y="226" font-size="17" fill="#b7b7bf">Contributions (last year)</text>
  <text x="340" y="226" font-size="17" fill="#ffffff" text-anchor="end">55</text>
  <text x="20" y="268" font-size="17" fill="#b7b7bf">Primary language</text>
  <text x="340" y="268" font-size="17" fill="#ffffff" text-anchor="end">Python</text>
  <text x="20" y="310" font-size="17" fill="#b7b7bf">Focus area</text>
  <text x="340" y="310" font-size="17" fill="#ffffff" text-anchor="end">AI / CV</text>

  <!-- right: activity -->
  <rect x="390" y="90" width="760" height="270" fill="none" stroke="#343A40" stroke-width="1.3" stroke-opacity=".6"/>
  <text x="410" y="124" font-size="15" letter-spacing="4" fill="#e6e6ec">ACTIVITY</text>
  <line x1="410" y1="140" x2="1130" y2="140" stroke="#343A40" stroke-width="1.3" stroke-opacity=".6"/>

  <line x1="650" y1="170" x2="650" y2="330" stroke="#343A40" stroke-width="1.3" stroke-opacity=".4"/>
  <line x1="890" y1="170" x2="890" y2="330" stroke="#343A40" stroke-width="1.3" stroke-opacity=".4"/>

  <g class="rise n1">
    <text x="410" y="240" font-size="44" fill="#ffffff">43</text>
    <text x="410" y="268" font-size="12" fill="#b7b7bf" letter-spacing="1.5">TOTAL CONTRIBUTIONS</text>
    <text x="410" y="286" font-size="10.5" fill="#6f6f78">Aug 22, 2025 – present</text>
  </g>

  <g class="rise n2">
    <text x="650" y="240" font-size="44" fill="#ffffff">1</text>
    <text x="650" y="268" font-size="12" fill="#b7b7bf" letter-spacing="1.5">CURRENT STREAK</text>
    <text x="650" y="286" font-size="10.5" fill="#6f6f78">as of Jul 19</text>
  </g>

  <g class="rise n3">
    <text x="890" y="240" font-size="44" fill="#ffffff">2</text>
    <text x="890" y="268" font-size="12" fill="#b7b7bf" letter-spacing="1.5">LONGEST STREAK</text>
    <text x="890" y="286" font-size="10.5" fill="#6f6f78">Aug 22 – Aug 23, 2025</text>
  </g>

  <!-- contribution telemetry chart -->
  <rect x="0" y="390" width="1150" height="330" fill="none" stroke="#343A40" stroke-width="1.3" stroke-opacity=".6"/>
  <text x="20" y="424" font-size="15" letter-spacing="4" fill="#e6e6ec">CONTRIBUTION TELEMETRY</text>
  <line x1="20" y1="440" x2="1130" y2="440" stroke="#343A40" stroke-width="1.3" stroke-opacity=".6"/>

  <!-- gridlines -->
  <g stroke="#343A40" stroke-width="1" stroke-opacity=".35" stroke-dasharray="3 3">
    <line x1="100" y1="470" x2="1080" y2="470"/>
    <line x1="100" y1="507" x2="1080" y2="507"/>
    <line x1="100" y1="544" x2="1080" y2="544"/>
    <line x1="100" y1="580" x2="1080" y2="580"/>
    <line x1="100" y1="617" x2="1080" y2="617"/>
    <line x1="100" y1="654" x2="1080" y2="654"/>
  </g>
  <text x="85" y="474" font-size="10" fill="#6f6f78" text-anchor="end">30</text>
  <text x="85" y="511" font-size="10" fill="#6f6f78" text-anchor="end">25</text>
  <text x="85" y="548" font-size="10" fill="#6f6f78" text-anchor="end">20</text>
  <text x="85" y="584" font-size="10" fill="#6f6f78" text-anchor="end">15</text>
  <text x="85" y="621" font-size="10" fill="#6f6f78" text-anchor="end">10</text>
  <text x="85" y="658" font-size="10" fill="#6f6f78" text-anchor="end">5</text>
  <text x="85" y="691" font-size="10" fill="#6f6f78" text-anchor="end">0</text>

  <line x1="100" y1="470" x2="100" y2="691" stroke="#343A40" stroke-width="1.3" stroke-opacity=".6"/>
  <line x1="100" y1="691" x2="1080" y2="691" stroke="#343A40" stroke-width="1.3" stroke-opacity=".6"/>

  <polygon class="fillfade" fill="#ffffff" fill-opacity=".06"
    points="100,691 132.7,691 165.3,691 198,691 230.7,691 263.3,691 296,691 328.7,691 361.3,691 394,691 426.7,691 459.3,691 492,691 524.7,691 557.3,691 590,691 622.7,691 655.3,691 688,691 720.7,691 753.3,691 786,691 818.7,691 851.3,691 884,676 916.7,691 949.3,691 982,691 1014.7,691 1047.3,691 1080,508 1080,691"/>

  <polyline class="spark" fill="none" stroke="#ffffff" stroke-width="1.6"
    points="100,691 132.7,691 165.3,691 198,691 230.7,691 263.3,691 296,691 328.7,691 361.3,691 394,691 426.7,691 459.3,691 492,691 524.7,691 557.3,691 590,691 622.7,691 655.3,691 688,691 720.7,691 753.3,691 786,691 818.7,691 851.3,691 884,676 916.7,691 949.3,691 982,691 1014.7,691 1047.3,691 1080,508"/>

  <circle class="ping" cx="1080" cy="508" r="3" stroke="#ffffff" fill="none"/>
  <circle cx="1080" cy="508" r="2.5" fill="#ffffff"/>

  <g font-size="8" fill="#6f6f78" text-anchor="middle">
    <text x="100" y="706">19</text><text x="132.7" y="706">20</text><text x="165.3" y="706">21</text>
    <text x="198" y="706">22</text><text x="230.7" y="706">23</text><text x="263.3" y="706">24</text>
    <text x="296" y="706">25</text><text x="328.7" y="706">26</text><text x="361.3" y="706">27</text>
    <text x="394" y="706">28</text><text x="426.7" y="706">29</text><text x="459.3" y="706">30</text>
    <text x="492" y="706">1</text><text x="524.7" y="706">2</text><text x="557.3" y="706">3</text>
    <text x="590" y="706">4</text><text x="622.7" y="706">5</text><text x="655.3" y="706">6</text>
    <text x="688" y="706">7</text><text x="720.7" y="706">8</text><text x="753.3" y="706">9</text>
    <text x="786" y="706">10</text><text x="818.7" y="706">11</text><text x="851.3" y="706">12</text>
    <text x="884" y="706">13</text><text x="916.7" y="706">14</text><text x="949.3" y="706">15</text>
    <text x="982" y="706">16</text><text x="1014.7" y="706">17</text><text x="1047.3" y="706">18</text>
    <text x="1080" y="706" fill="#ffffff">19</text>
  </g>

  <text x="590" y="738" font-size="11" letter-spacing="2" fill="#6f6f78" text-anchor="middle">DAYS</text>
  <text x="45" y="580" font-size="11" letter-spacing="2" fill="#6f6f78" text-anchor="middle" transform="rotate(-90 45 580)">CONTRIBUTIONS</text>
</svg>
