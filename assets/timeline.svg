<svg width="1150" height="320" viewBox="0 0 1150 320" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, monospace">
  <style>
    .reveal { stroke-dasharray: 700; stroke-dashoffset: 700; animation: revealline 1.3s cubic-bezier(.4,0,.2,1) .3s forwards; }
    @keyframes revealline { to { stroke-dashoffset: 0; } }
    @media (prefers-reduced-motion: reduce) { .reveal { animation: none; stroke-dashoffset: 0; } }
  </style>

  <rect width="1150" height="320" fill="#0d1117"/>
